<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#0a1212"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)"/>

  <!-- Left accent bar -->
  <rect x="0" y="30" width="3" height="270" fill="#00d4aa" opacity="0.55"/>

  <!-- Title bar -->
  <rect width="900" height="30" fill="#171717"/>
  <line x1="0" y1="30" x2="900" y2="30" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="18" cy="15" r="5.5" fill="#FF5F57"/>
  <circle cx="37" cy="15" r="5.5" fill="#FFBD2E"/>
  <circle cx="56" cy="15" r="5.5" fill="#28C940"/>

  <!-- Window title — 提亮至 #666 -->
  <text x="450" y="20" font-family="Courier New, monospace" font-size="11.5"
        fill="#666666" text-anchor="middle" letter-spacing="0.5">bash — cdryzun@terminal</text>

  <!-- Prompt — 分隔符从 #3a3a3a 提亮至 #606060 -->
  <text y="66" font-family="Courier New, monospace" font-size="13">
    <tspan x="26" fill="#00d4aa">user@cdryzun</tspan><tspan fill="#606060">:</tspan><tspan fill="#5a9eff">~</tspan><tspan fill="#606060">$ </tspan><tspan fill="#c0c0c0">whoami</tspan>
  </text>

  <!-- Name — 分隔符从 #252525 提亮至 #484848 -->
  <text y="110" font-family="Courier New, monospace" font-size="36" font-weight="700">
    <tspan x="26" fill="#f2f2f2">John</tspan><tspan fill="#484848">  ·  </tspan><tspan fill="#00d4aa">@cdryzun</tspan>
  </text>

  <!-- Role -->
  <text x="26" y="134" font-family="Courier New, monospace" font-size="13.5" fill="#00d4aa" letter-spacing="0.3">SRE · DevOps · AI Infrastructure Engineer</text>

  <!-- Location — 从 #404040 提亮至 #767676 -->
  <circle cx="28" cy="152" r="3.5" fill="#28C940" opacity="0.9"/>
  <text x="38" y="156" font-family="Courier New, monospace" font-size="12" fill="#767676">Shenzhen, China  ·  building reliable systems at scale</text>

  <!-- Divider 1 — 从 #1c1c1c 提亮至 #2e2e2e -->
  <line x1="26" y1="171" x2="874" y2="171" stroke="#2e2e2e" stroke-width="1"/>

  <!-- Stack line 1 — bullet #555, 分隔符 #444 -->
  <text y="191" font-family="Courier New, monospace" font-size="12.5">
    <tspan x="26" fill="#555555">▸ </tspan><tspan fill="#4a8eff">Kubernetes</tspan><tspan fill="#444444"> · </tspan><tspan fill="#4a8eff">Docker</tspan><tspan fill="#444444"> · </tspan><tspan fill="#4a8eff">Terraform</tspan><tspan fill="#444444"> · </tspan><tspan fill="#4a8eff">ArgoCD</tspan><tspan fill="#444444"> · </tspan><tspan fill="#4a8eff">Prometheus</tspan><tspan fill="#444444"> · </tspan><tspan fill="#4a8eff">Grafana</tspan><tspan fill="#444444"> · </tspan><tspan fill="#4a8eff">GitLab CI</tspan>
  </text>

  <!-- Stack line 2 — 同上 -->
  <text y="211" font-family="Courier New, monospace" font-size="12.5">
    <tspan x="26" fill="#555555">▸ </tspan><tspan fill="#4a8eff">Go</tspan><tspan fill="#444444"> · </tspan><tspan fill="#4a8eff">Python</tspan><tspan fill="#444444"> · </tspan><tspan fill="#4a8eff">Django</tspan><tspan fill="#444444"> · </tspan><tspan fill="#4a8eff">Bash</tspan><tspan fill="#444444"> · </tspan><tspan fill="#4a8eff">LLM-Ops</tspan><tspan fill="#444444"> · </tspan><tspan fill="#4a8eff">Qdrant</tspan><tspan fill="#444444"> · </tspan><tspan fill="#4a8eff">PostgreSQL</tspan>
  </text>

  <!-- Divider 2 -->
  <line x1="26" y1="225" x2="874" y2="225" stroke="#2e2e2e" stroke-width="1"/>

  <!-- Final prompt -->
  <text y="258" font-family="Courier New, monospace" font-size="13">
    <tspan x="26" fill="#00d4aa">user@cdryzun</tspan><tspan fill="#606060">:</tspan><tspan fill="#5a9eff">~</tspan><tspan fill="#606060">$ </tspan>
  </text>
  <rect x="148" y="246" width="9" height="14" fill="#f2f2f2" opacity="0.8"/>
</svg>
