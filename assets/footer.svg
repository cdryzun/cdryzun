<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 48" width="900" height="48">
  <defs>
    <pattern id="sl" x="0" y="0" width="900" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="900" height="2" fill="#000000" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="48" fill="#0d0d0d"/>
  <rect width="900" height="48" fill="url(#sl)"/>

  <!-- Top border line -->
  <line x1="0" y1="1" x2="900" y2="1" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Corner marks -->
  <path d="M5,3 L18,3  M5,3  L5,16"  stroke="#00bfff" stroke-width="1.5" fill="none" opacity="0.55"/>
  <path d="M895,3 L882,3  M895,3  L895,16" stroke="#00bfff" stroke-width="1.5" fill="none" opacity="0.55"/>
  <path d="M5,45 L18,45 M5,45  L5,32"  stroke="#00bfff" stroke-width="1.5" fill="none" opacity="0.55"/>
  <path d="M895,45 L882,45 M895,45 L895,32" stroke="#00bfff" stroke-width="1.5" fill="none" opacity="0.55"/>

  <!-- Center terminal prompt -->
  <text x="450" y="29" font-family="Courier New, monospace" font-size="11" text-anchor="middle">
    <tspan fill="#00ff41">user@cdryzun</tspan><tspan fill="#444">:</tspan><tspan fill="#4a9eff">~</tspan><tspan fill="#444">$ </tspan><tspan fill="#555">_</tspan>
  </text>

  <!-- Side hex values (decorative) -->
  <text x="38" y="29"  font-family="Courier New, monospace" font-size="10" fill="#1a3a1a" opacity="0.9">0x00FF41</text>
  <text x="810" y="29" font-family="Courier New, monospace" font-size="10" fill="#1a2a3a" opacity="0.9">0x00BFFF</text>
</svg>
